<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuardianAI Mobile Camera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #1a202c;
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #718096;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #2d3748;
            font-size: 14px;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 16px;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #48bb78;
            color: white;
        }
        
        .btn-primary:hover {
            background: #38a169;
        }
        
        .btn-danger {
            background: #f56565;
            color: white;
        }
        
        .btn-danger:hover {
            background: #e53e3e;
        }
        
        button:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
        }
        
        video {
            width: 100%;
            border-radius: 8px;
            background: #000;
        }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }
        
        .stat {
            background: #f7fafc;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 12px;
            color: #718096;
            margin-bottom: 4px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #2d3748;
        }
        
        .status {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status.online {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .status.offline {
            background: #fed7d7;
            color: #742a2a;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .hidden {
            display: none !important;
        }
        
        .alert {
            background: #fef5e7;
            border: 2px solid #f39c12;
            color: #7d6608;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📱 GuardianAI Mobile Camera</h1>
            <p class="subtitle">Stream your camera to the monitoring system</p>
            
            <div id="setupForm">
                <label for="apiUrl">Backend URL</label>
                <input 
                    type="text" 
                    id="apiUrl" 
                    value="http://localhost:8000" 
                    placeholder="http://your-backend-url:8000"
                >
                
                <label for="roomSelect">Select Room</label>
                <select id="roomSelect">
                    <option value="">Loading rooms...</option>
                </select>
                
                <label for="fpsRange">Frame Rate: <span id="fpsValue">10</span> FPS</label>
                <input 
                    type="range" 
                    id="fpsRange" 
                    min="5" 
                    max="30" 
                    value="10"
                    style="margin-bottom: 24px;"
                >
                
                <button id="startBtn" class="btn-primary">Start Streaming</button>
            </div>
            
            <div id="streamingView" class="hidden">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <span class="status online">
                        <span class="status-dot" style="background: #22543d;"></span>
                        STREAMING
                    </span>
                    <span id="roomName" style="font-weight: 600;"></span>
                </div>
                
                <video id="video" autoplay playsinline muted></video>
                
                <div class="stats">
                    <div class="stat">
                        <div class="stat-label">Frames Sent</div>
                        <div class="stat-value" id="frameCount">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Alerts Detected</div>
                        <div class="stat-value" id="alertCount">0</div>
                    </div>
                </div>
                
                <button id="stopBtn" class="btn-danger" style="margin-top: 16px;">Stop Streaming</button>
            </div>
        </div>
        
        <div id="alertBox" class="card alert hidden"></div>
    </div>
    
    <canvas id="canvas" style="display: none;"></canvas>

    <script>
        let streaming = false;
        let mediaStream = null;
        let streamInterval = null;
        let frameCount = 0;
        let alertCount = 0;
        let selectedRoom = null;
        let apiUrl = 'http://localhost:8000';

        const elements = {
            apiUrl: document.getElementById('apiUrl'),
            roomSelect: document.getElementById('roomSelect'),
            fpsRange: document.getElementById('fpsRange'),
            fpsValue: document.getElementById('fpsValue'),
            startBtn: document.getElementById('startBtn'),
            stopBtn: document.getElementById('stopBtn'),
            setupForm: document.getElementById('setupForm'),
            streamingView: document.getElementById('streamingView'),
            video: document.getElementById('video'),
            canvas: document.getElementById('canvas'),
            frameCount: document.getElementById('frameCount'),
            alertCount: document.getElementById('alertCount'),
            roomName: document.getElementById('roomName'),
            alertBox: document.getElementById('alertBox')
        };

        // Update FPS display
        elements.fpsRange.addEventListener('input', (e) => {
            elements.fpsValue.textContent = e.target.value;
        });

        // Load rooms on page load
        window.addEventListener('load', async () => {
            apiUrl = elements.apiUrl.value;
            await loadRooms();
        });

        elements.apiUrl.addEventListener('change', async () => {
            apiUrl = elements.apiUrl.value;
            await loadRooms();
        });

        async function loadRooms() {
            try {
                const response = await fetch(`${apiUrl}/api/rooms`);
                const rooms = await response.json();
                
                const mobileRooms = rooms.filter(r => r.camera_url === 'mobile');
                
                if (mobileRooms.length === 0) {
                    elements.roomSelect.innerHTML = '<option value="">No mobile rooms found</option>';
                    elements.startBtn.disabled = true;
                    showAlert('No rooms configured for mobile streaming. Please add a room with "mobile" as the camera URL.');
                } else {
                    elements.roomSelect.innerHTML = mobileRooms.map(room => 
                        `<option value="${room.id}">Room ${room.room_number}${room.floor ? ` (Floor ${room.floor})` : ''}</option>`
                    ).join('');
                    elements.startBtn.disabled = false;
                    hideAlert();
                }
            } catch (error) {
                console.error('Error loading rooms:', error);
                showAlert('Failed to connect to backend. Check the URL and make sure the server is running.');
                elements.startBtn.disabled = true;
            }
        }

        elements.startBtn.addEventListener('click', startStreaming);
        elements.stopBtn.addEventListener('click', stopStreaming);

        async function startStreaming() {
            selectedRoom = elements.roomSelect.value;
            if (!selectedRoom) {
                alert('Please select a room');
                return;
            }

            // Check if getUserMedia is available
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert('Camera access not available. This page must be accessed via HTTPS or localhost. Current URL: ' + window.location.href);
                showAlert('⚠️ Camera requires HTTPS or localhost. Try using localhost on this device or setup HTTPS.');
                return;
            }

            try {
                // Request camera access
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'user',
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    },
                    audio: false
                });

                elements.video.srcObject = mediaStream;
                
                await new Promise(resolve => {
                    elements.video.onloadedmetadata = () => {
                        elements.video.play();
                        resolve();
                    };
                });

                streaming = true;
                frameCount = 0;
                alertCount = 0;
                elements.frameCount.textContent = '0';
                elements.alertCount.textContent = '0';
                
                const roomText = elements.roomSelect.options[elements.roomSelect.selectedIndex].text;
                elements.roomName.textContent = roomText;

                // Switch views
                elements.setupForm.classList.add('hidden');
                elements.streamingView.classList.remove('hidden');

                // Start sending frames
                const fps = parseInt(elements.fpsRange.value);
                const interval = 1000 / fps;
                streamInterval = setInterval(captureAndSendFrame, interval);

            } catch (error) {
                console.error('Error starting stream:', error);
                alert('Failed to access camera: ' + error.message);
            }
        }

        function stopStreaming() {
            if (streamInterval) {
                clearInterval(streamInterval);
                streamInterval = null;
            }

            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }

            elements.video.srcObject = null;
            streaming = false;

            // Switch views
            elements.streamingView.classList.add('hidden');
            elements.setupForm.classList.remove('hidden');
        }

        async function captureAndSendFrame() {
            if (!streaming) return;

            const canvas = elements.canvas;
            const video = elements.video;
            const context = canvas.getContext('2d');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            const frameData = canvas.toDataURL('image/jpeg', 0.8);

            try {
                const response = await fetch(
                    `${apiUrl}/api/streams/mobile/${selectedRoom}/frame`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ frame: frameData }),
                        timeout: 5000
                    }
                );

                const data = await response.json();
                frameCount++;
                elements.frameCount.textContent = frameCount;
                
                if (data.alerts_detected > 0) {
                    alertCount += data.alerts_detected;
                    elements.alertCount.textContent = alertCount;
                }
            } catch (error) {
                console.error('Error sending frame:', error);
            }
        }

        function showAlert(message) {
            elements.alertBox.textContent = message;
            elements.alertBox.classList.remove('hidden');
        }

        function hideAlert() {
            elements.alertBox.classList.add('hidden');
        }
    </script>
</body>
</html>
